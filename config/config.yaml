# ============================================================
# LLM Math Agent 配置文件
# ============================================================

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  dtype: "bfloat16"
  trust_remote_code: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj",
                    "gate_proj", "up_proj", "down_proj"]
  use_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

data:
  gsm8k_path: "openai/gsm8k"
  math_path: "hendrycks/math"
  amc_path: ""
  max_seq_length: 2048
  train_ratio: 0.9
  sft_examples: 500
  l1_size: 1000
  l2_train_size: 9000
  l2_val_size: 1000

agent:
  max_turns: 10
  temperature: 1.0
  tools: ["calculator", "python_exec", "sympy"]
  system_prompt_path: "config/prompts/system.txt"

rl:
  algorithm: "grpo"
  batch_size: 16
  group_size: 8
  kl_coef: 0.04
  clip_eps: 0.2
  gamma: 1.0
  learning_rate: 2.0e-6
  lr_scheduler: "cosine"
  warmup_steps: 30
  max_grad_norm: 1.0
  max_steps: 500
  eval_every: 50
  save_every: 100
  rft_temperature: 0.8
  rft_filter_ratio: 0.5
  rft_epochs: 2
  rft_rounds: 2

reward:
  outcome_weight: 1.0
  format_weight: 0.1
  step_penalty: 0.0

training:
  seed: 42
  wandb_project: "llm-math-agent"
  output_dir: "./outputs"
  checkpoint_dir: "./checkpoints"

inference:
  backend: "vllm"
  max_tokens: 1024
  temperature: 0.7
  stop_tokens: ["</tool_call>", "</answer>"]
